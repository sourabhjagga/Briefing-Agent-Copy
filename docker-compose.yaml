services:
  cc-brief-agent:
    # Pull pre-built image from Docker Hub instead of building from source.
    # This is pushed automatically by .github/workflows/docker-publish-fresh.yml
    # on every push to main. No local build needed on the host.
    image: sourabhjagga/briefing-agent-fresh:latest
    # Always pull the latest image from Docker Hub on every deploy.
    # This ensures Coolify never uses a stale cached layer and always
    # runs the image built by the most recent GitHub Actions workflow run.
    pull_policy: always
    container_name: cc-brief-agent
    restart: unless-stopped
    depends_on:
      warp-proxy:
        condition: service_healthy
        restart: false
      flaresolverr:
        condition: service_started
    volumes:
      - cc_brief_data:/app/data
      - cc_brief_logs:/app/logs
    ports:
      - "3456:3000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEALS_BOT_TOKEN=${DEALS_BOT_TOKEN}
      - SUMMARY_HOUR=${SUMMARY_HOUR:-6}
      - SUMMARY_MINUTE=${SUMMARY_MINUTE:-0}
      - WHATSAPP_GROUPS=${WHATSAPP_GROUPS}
      - WHATSAPP_ADMIN_JID=${WHATSAPP_ADMIN_JID}
      - TZ=${TZ:-Asia/Kolkata}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_MESSAGES_FOR_SUMMARY=${MAX_MESSAGES_FOR_SUMMARY:-2000}
      - DB_PATH=/app/data/messages.db
      - TECHNOFINO_USERNAME=${TECHNOFINO_USERNAME}
      - TECHNOFINO_PASSWORD=${TECHNOFINO_PASSWORD}
      - DESIDIME_USERNAME=${DESIDIME_USERNAME}
      - DESIDIME_PASSWORD=${DESIDIME_PASSWORD}
      - REDDIT_USERNAME=${REDDIT_USERNAME}
      - REDDIT_PASSWORD=${REDDIT_PASSWORD}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PROXY=socks5://warp-proxy:9091
      - FLARESOLVERR_URL=http://flaresolverr:8191
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    mem_limit: 1g
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL:-info}
      - CAPTCHA_SOLVER=none
      - TZ=${TZ:-Asia/Kolkata}
    ports:
      - "8291:8191"
    restart: unless-stopped

  warp-proxy:
    image: ghcr.io/mon-ius/docker-warp-socks:v6
    container_name: warp-proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9091 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  cc_brief_data:
  cc_brief_logs:
