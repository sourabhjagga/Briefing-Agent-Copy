services:
  cc-brief-agent:
    # Pull pre-built image from Docker Hub instead of building from source.
    # This is pushed automatically by .github/workflows/docker-publish-fresh.yml
    # on every push to main. No local build needed on the host.
    image: sourabhjagga/briefing-agent-fresh:latest
    # Always pull the latest image from Docker Hub on every deploy.
    # This ensures Coolify never uses a stale cached layer and always
    # runs the image built by the most recent GitHub Actions workflow run.
    pull_policy: always
    container_name: cc-brief-agent
    restart: unless-stopped
    depends_on:
      warp-proxy:
        condition: service_healthy
        restart: false
      evolution-api:
        condition: service_healthy
        restart: false
      postgres:
        condition: service_healthy
        restart: false
      redis:
        condition: service_healthy
        restart: false
    volumes:
      - cc_brief_data:/app/data
      - cc_brief_logs:/app/logs
    ports:
      - "3456:3000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEALS_BOT_TOKEN=${DEALS_BOT_TOKEN}
      - SUMMARY_HOUR=${SUMMARY_HOUR:-6}
      - SUMMARY_MINUTE=${SUMMARY_MINUTE:-0}
      - WHATSAPP_GROUPS=${WHATSAPP_GROUPS}
      - WHATSAPP_ADMIN_JID=${WHATSAPP_ADMIN_JID}
      - TZ=${TZ:-Asia/Kolkata}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_MESSAGES_FOR_SUMMARY=${MAX_MESSAGES_FOR_SUMMARY:-2000}
      - DB_PATH=/app/data/messages.db
      - TECHNOFINO_USERNAME=${TECHNOFINO_USERNAME}
      - TECHNOFINO_PASSWORD=${TECHNOFINO_PASSWORD}
      - DESIDIME_USERNAME=${DESIDIME_USERNAME}
      - DESIDIME_PASSWORD=${DESIDIME_PASSWORD}
      - REDDIT_USERNAME=${REDDIT_USERNAME}
      - REDDIT_PASSWORD=${REDDIT_PASSWORD}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PROXY=socks5://warp-proxy:9091
      # Evolution API Configuration
      - USE_EVOLUTION_API=${USE_EVOLUTION_API:-true}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://evolution-api:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-cc-brief}
      - EVOLUTION_WEBHOOK_URL=${EVOLUTION_WEBHOOK_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  warp-proxy:
    image: ghcr.io/mon-ius/docker-warp-socks:v6
    container_name: warp-proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9091 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  evolution-api:
    image: evoapicloud/evolution-api:v2.1.1
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_URL=http://evolution-api:8080
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@postgres:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution-api
      - REDIS_URI=redis://redis:6379
      - REDIS_DB=0
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - LOG_LEVEL=info
      - CORS_ORIGIN=*
      - CONFIG_SESSION_PHONE_CLIENT=CC Brief Agent
      - CONFIG_SESSION_PHONE_NAME=CC Brief Agent
    depends_on:
      postgres:
        condition: service_healthy
        restart: false
      redis:
        condition: service_healthy
        restart: false
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect({port: 8080, host: 'localhost'}, () => process.exit(0)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    volumes:
      - evolution_data:/evolution/instances

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - POSTGRES_DB=evolution
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  cc_brief_data:
  cc_brief_logs:
  evolution_data:
  postgres_data:
  redis_data:
