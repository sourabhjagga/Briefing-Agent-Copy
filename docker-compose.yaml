services:
  cc-brief-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cc-brief-agent
    restart: unless-stopped
    # warp-proxy is an optional fallback — cc-brief-agent starts after warp
    # is confirmed listening on SOCKS5 port, but warp failure won't block the app
    # because condition: service_healthy only gates startup order, not continued
    # operation. If warp later goes unhealthy, cc-brief-agent keeps running.
    depends_on:
      warp-proxy:
        condition: service_healthy
        restart: false
      flaresolverr:
        condition: service_started
    volumes:
      - cc_brief_data:/app/data
      - cc_brief_logs:/app/logs
    ports:
      - "3456:3000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEALS_BOT_TOKEN=${DEALS_BOT_TOKEN}
      - SUMMARY_HOUR=${SUMMARY_HOUR:-6}
      - SUMMARY_MINUTE=${SUMMARY_MINUTE:-0}
      - WHATSAPP_GROUPS=${WHATSAPP_GROUPS}
      - WHATSAPP_ADMIN_JID=${WHATSAPP_ADMIN_JID}
      - TZ=${TZ:-Asia/Kolkata}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_MESSAGES_FOR_SUMMARY=${MAX_MESSAGES_FOR_SUMMARY:-2000}
      - DB_PATH=/app/data/messages.db
      - TECHNOFINO_USERNAME=${TECHNOFINO_USERNAME}
      - TECHNOFINO_PASSWORD=${TECHNOFINO_PASSWORD}
      - DESIDIME_USERNAME=${DESIDIME_USERNAME}
      - DESIDIME_PASSWORD=${DESIDIME_PASSWORD}
      - REDDIT_USERNAME=${REDDIT_USERNAME}
      - REDDIT_PASSWORD=${REDDIT_PASSWORD}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PROXY=socks5://warp-proxy:9091
      - FLARESOLVERR_URL=http://flaresolverr:8191
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    mem_limit: 1g
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL:-info}
      - CAPTCHA_SOLVER=none
      - TZ=${TZ:-Asia/Kolkata}
    ports:
      - "8291:8191"
    restart: unless-stopped

  warp-proxy:
    # Cloudflare WARP SOCKS5 proxy — fallback for when Telegram is blocked.
    # Healthcheck uses nc (netcat) to verify the SOCKS5 TCP port is open.
    # wget/curl checking http:// against a SOCKS5 port always fails — fixed here.
    image: ghcr.io/mon-ius/docker-warp-socks:v6
    container_name: warp-proxy
    restart: unless-stopped
    healthcheck:
      # nc -z = TCP port scan only (no data sent). Correctly validates SOCKS5.
      # wget against a SOCKS5 port sends HTTP which SOCKS5 rejects — that was the bug.
      test: ["CMD-SHELL", "nc -z localhost 9091 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  cc_brief_data:
  cc_brief_logs:
