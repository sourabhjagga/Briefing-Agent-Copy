version: '3.8'

services:
  cc-brief-agent:
    image: sourabhjagga/briefing-agent-fresh:latest
    container_name: cc-brief-agent
    restart: unless-stopped
    depends_on:
      warp-proxy:
        condition: service_healthy
    volumes:
      - cc_brief_data_test:/app/data
      - cc_brief_logs:/app/logs
    ports:
      - "3456:3000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEALS_BOT_TOKEN=${DEALS_BOT_TOKEN}
      - SUMMARY_HOUR=${SUMMARY_HOUR:-6}
      - SUMMARY_MINUTE=${SUMMARY_MINUTE:-0}
      - WHATSAPP_GROUPS=${WHATSAPP_GROUPS}
      # FIX: WHATSAPP_ADMIN_JID was missing — sendSystemAlert silently skipped
      # WhatsApp alert delivery in all Docker/Coolify deployments.
      - WHATSAPP_ADMIN_JID=${WHATSAPP_ADMIN_JID}
      - TZ=${TZ:-Asia/Kolkata}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_MESSAGES_FOR_SUMMARY=${MAX_MESSAGES_FOR_SUMMARY:-2000}
      - DB_PATH=/app/data/messages.db
      - TECHNOFINO_USERNAME=${TECHNOFINO_USERNAME}
      - TECHNOFINO_PASSWORD=${TECHNOFINO_PASSWORD}
      - DESIDIME_USERNAME=${DESIDIME_USERNAME}
      - DESIDIME_PASSWORD=${DESIDIME_PASSWORD}
      - REDDIT_USERNAME=${REDDIT_USERNAME}
      - REDDIT_PASSWORD=${REDDIT_PASSWORD}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PROXY=socks5://warp-proxy:9091
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    mem_limit: 1g
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL:-info}
      - CAPTCHA_SOLVER=none
      - TZ=${TZ:-Asia/Kolkata}
    ports:
      - "8291:8191"
    restart: unless-stopped

  warp-proxy:
    image: monius/docker-warp-socks:latest
    container_name: warp-proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9091"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  cc_brief_data_test:
  cc_brief_logs:
