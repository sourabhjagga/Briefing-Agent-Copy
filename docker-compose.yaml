services:
  cc-brief-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cc-brief-agent
    restart: unless-stopped
    # warp-proxy and flaresolverr are optional sidecars.
    # cc-brief-agent starts unconditionally — warp is a fallback only
    # if Telegram is blocked. Removing hard depends_on prevents deployment
    # failure when warp-proxy healthcheck doesn't pass.
    volumes:
      - cc_brief_data:/app/data
      - cc_brief_logs:/app/logs
    ports:
      - "3456:3000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEALS_BOT_TOKEN=${DEALS_BOT_TOKEN}
      - SUMMARY_HOUR=${SUMMARY_HOUR:-6}
      - SUMMARY_MINUTE=${SUMMARY_MINUTE:-0}
      - WHATSAPP_GROUPS=${WHATSAPP_GROUPS}
      - WHATSAPP_ADMIN_JID=${WHATSAPP_ADMIN_JID}
      - TZ=${TZ:-Asia/Kolkata}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_MESSAGES_FOR_SUMMARY=${MAX_MESSAGES_FOR_SUMMARY:-2000}
      - DB_PATH=/app/data/messages.db
      - TECHNOFINO_USERNAME=${TECHNOFINO_USERNAME}
      - TECHNOFINO_PASSWORD=${TECHNOFINO_PASSWORD}
      - DESIDIME_USERNAME=${DESIDIME_USERNAME}
      - DESIDIME_PASSWORD=${DESIDIME_PASSWORD}
      - REDDIT_USERNAME=${REDDIT_USERNAME}
      - REDDIT_PASSWORD=${REDDIT_PASSWORD}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PROXY=socks5://warp-proxy:9091
      - FLARESOLVERR_URL=http://flaresolverr:8191
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    mem_limit: 1g
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL:-info}
      - CAPTCHA_SOLVER=none
      - TZ=${TZ:-Asia/Kolkata}
    ports:
      - "8291:8191"
    restart: unless-stopped

  warp-proxy:
    # Optional fallback SOCKS5 proxy via Cloudflare WARP.
    # Used only when Telegram is blocked on the host network.
    # Runs as a background sidecar — cc-brief-agent does NOT depend on it.
    # If warp-proxy is unhealthy, cc-brief-agent continues using direct connection.
    image: ghcr.io/mon-ius/docker-warp-socks:v6
    container_name: warp-proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=5", "http://localhost:9091"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 40s

volumes:
  cc_brief_data:
  cc_brief_logs:
