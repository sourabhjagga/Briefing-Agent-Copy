<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brief Agent — Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- React 18 via cdnjs (more reliable than unpkg on VPS) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root">Loading...</div>
  <script>
    // If the dashboard hasn't become interactive within 3 seconds, show an error
    setTimeout(() => {
      const root = document.getElementById('root');
      if (root && root.textContent.trim() === 'Loading...') {
        root.textContent = 'Error: Dashboard failed to load. Check console for details.';
        root.style.color = 'red';
      }
    }, 3000);
  </script>
  <script src="app.min.js"></script>
</body>
</html>
