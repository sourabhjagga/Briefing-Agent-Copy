name: Docker Publish Fresh

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  repository_dispatch:
    types: [ docker-publish ]

env:
  REGISTRY: docker.io
  # Always lowercase — Docker Hub rejects uppercase image names.
  # We derive this once and reuse across all steps.
  IMAGE_NAME: sourabhjagga/briefing-agent-fresh

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # JOB 1: Build the multi-arch image and push it to Docker Hub.
  # ──────────────────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        # Required to emulate ARM64 on the amd64 GitHub Actions runner
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use a named builder so cache keys are stable across runs
          driver-opts: image=moby/buildkit:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── ARM64 smoke-test: build arm64 only, no push ──────────────────
      # Catches Dockerfile errors and native module compile failures
      # (e.g. better-sqlite3 node-gyp) before the expensive multi-arch
      # push. Fails loudly here rather than silently producing a broken image.
      - name: Smoke-test ARM64 build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: false
          provenance: false
          cache-from: type=gha,scope=arm64-test
          cache-to: type=gha,mode=max,scope=arm64-test

      # ── Multi-arch push ───────────────────────────────────────────────
      # provenance:false prevents Buildx from attaching an attestation
      # manifest that confuses some Docker clients into pulling the wrong
      # architecture layer (amd64 instead of arm64) on ARM64 hosts.
      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=multiarch
          cache-to: type=gha,mode=max,scope=multiarch

  # ──────────────────────────────────────────────────────────────────────
  # JOB 2: Verify the pushed manifest actually contains ARM64.
  # If the ARM64 layer is missing this job fails loudly so you know
  # before trying to deploy on the Oracle VM.
  # ──────────────────────────────────────────────────────────────────────
  verify-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Inspect manifest and confirm linux/arm64 is present
        run: |
          echo "=== Inspecting manifest for ${{ env.IMAGE_NAME }}:latest ==="
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:latest

          echo "=== Checking for linux/arm64 digest ==="
          if docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:latest | grep -q 'linux/arm64'; then
            echo "✅ linux/arm64 manifest confirmed present"
          else
            echo "❌ ERROR: linux/arm64 manifest NOT found in pushed image!"
            echo "The Oracle ARM64 VM will fail to pull this image."
            exit 1
          fi
