name: Docker Publish Fresh

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  repository_dispatch:
    types: [ docker-publish ]

env:
  REGISTRY: docker.io
  # Always lowercase — Docker Hub rejects uppercase image names.
  IMAGE_NAME: sourabhjagga/briefing-agent-fresh

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # JOB 1: Build the multi-arch image and push it to Docker Hub.
  # ──────────────────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── ARM64 smoke-test: build arm64 only, no push ──────────────────
      # cache-from uses the PREVIOUS run's cache (by branch) so node_modules
      # layer is still reused — only layers after a changed COPY are rebuilt.
      # cache-to writes back using the same branch key so next run can reuse
      # the npm install layer (which rarely changes).
      - name: Smoke-test ARM64 build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: false
          provenance: false
          # Use branch-scoped cache so npm install layer is reused,
          # but any file change (public/, src/) correctly invalidates
          # downstream layers via normal Docker cache invalidation.
          cache-from: type=gha,scope=arm64-test-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=arm64-test-${{ github.ref_name }}

      # ── Multi-arch push ───────────────────────────────────────────────
      # provenance:false prevents the attestation manifest from confusing
      # Docker clients into pulling the wrong arch on ARM64 hosts.
      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # cache-from: read from the branch-scoped cache (npm install reuse)
          # cache-to:   write back under the same key
          # Docker's own layer invalidation guarantees that any changed file
          # (public/app.js, src/*, etc.) causes all subsequent layers to
          # rebuild — so the fresh files are always baked into the image.
          cache-from: type=gha,scope=multiarch-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=multiarch-${{ github.ref_name }}

  # ──────────────────────────────────────────────────────────────────────
  # JOB 2: Verify the pushed manifest actually contains ARM64.
  # ──────────────────────────────────────────────────────────────────────
  verify-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Inspect manifest and confirm linux/arm64 is present
        run: |
          echo "=== Inspecting manifest for ${{ env.IMAGE_NAME }}:latest ==="
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:latest

          echo "=== Checking for linux/arm64 digest ==="
          if docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:latest | grep -q 'linux/arm64'; then
            echo "✅ linux/arm64 manifest confirmed present"
          else
            echo "❌ ERROR: linux/arm64 manifest NOT found in pushed image!"
            echo "The Oracle ARM64 VM will fail to pull this image."
            exit 1
          fi
