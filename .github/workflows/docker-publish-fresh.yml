name: Docker Publish Fresh

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  repository_dispatch:
    types: [ docker-publish ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # FIX: use hardcoded lowercase image name instead of
      # ${{ secrets.DOCKERHUB_USERNAME }}/... — Docker Hub rejects
      # uppercase characters in image names, causing silent push failures.
      # A versioned SHA tag is added alongside :latest so Coolify's image
      # polling can detect real changes even when :latest digest is cached.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            sourabhjagga/briefing-agent-fresh:latest
            sourabhjagga/briefing-agent-fresh:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
